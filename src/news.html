---
layout: layout.njk
title: News
description: Latest news and updates from IAEG Peru
---
<section class="wrap news-listing">
  <h1>News</h1>

  <div class="news-grid">
    {% for post in collections.news | reverse %}
    <a class="news-card" href="{{ post.url }}">
      {% if post.data.image %}
      <img src="{{ post.data.image }}" alt="{{ post.data.title }}">
      {% endif %}
      <div class="news-card-body">
        <h3>{{ post.data.title }}</h3>
        <p class="news-date">{{ post.data.date | readableDate }}</p>
        <p>{{ post.data.summary }}</p>
      </div>
    </a>
    {% endfor %}
  </div>
</section>
