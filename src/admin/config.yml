backend:
  name: github
  repo: iaegperu/web-iaegperu       # owner/repo on GitHub
  branch: main                      # branch Decap CMS will edit
  base_url: https://cms-oauth-steel.vercel.app   # your OAuth gateway on Vercel
  auth_endpoint: auth               # route exposed by the gateway
media_folder: "src/assets/images"
public_folder: "/assets/images"
collections:
  - name: "news"
    label: "News (Posts)"           
    label_singular: "News item"
    folder: "src/news"              
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "yyyy-MM-dd" }
      - { label: "Featured image", name: "image", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - label: "Attached PDF (optional)"
        name: "pdf"
        widget: "file"
        required: false
        media_folder: "src/assets/documents"
        public_folder: "/assets/documents"
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "pages"
    label: "Site pages"             
    label_singular: "Page"
    files:
      - label: "Home"               
        name: "home"
        file: "src/index.html"      
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Content", name: "body", widget: "markdown", required: false }
      - label: "About Us"           
        name: "about"
        file: "src/about.html"
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Content", name: "body", widget: "markdown", required: false }
      - label: "Projects"           
        name: "projects_page"
        file: "src/projects.html"   # <-- Ruta simplificada
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - label: "Project List"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Status", name: "status", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Description", name: "description", widget: "text" }
      - label: "Committees"         
        name: "committees_page"
        file: "src/committees.html" # <-- Ruta simplificada
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Content", name: "body", widget: "markdown", required: false }
      - label: "Partners"           
        name: "partners_page"
        file: "src/partners.html"   # <-- Ruta simplificada
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - label: "Partner organizations"
            name: "partners"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image", required: false }
              - { label: "Short description", name: "description", widget: "text", required: false }
              - { label: "Button label", name: "buttonLabel", widget: "string", default: "Website" }
              - { label: "Button link", name: "buttonUrl", widget: "string", required: false }
              - { label: "MoU link", name: "mouUrl", widget: "string", required: false }
      - label: "News"               
        name: "news_page"
        file: "src/news.html"
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Content/Intro", name: "body", widget: "markdown", required: false }
      - label: "Events"             
        name: "events_page"
        file: "src/events.html"
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - label: "Event List"
            name: "events"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date label (short, for the badge)", name: "dateLabel", widget: "string", hint: "e.g. SEP 2-4, 2026" }
              - { label: "Full date/time", name: "dateFull", widget: "string", required: false }
              - { label: "Location", name: "location", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Event link (View Event button)", name: "eventUrl", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
          - { label: "International events note", name: "internationalNote", widget: "text", required: false }
          - { label: "International events link", name: "internationalUrl", widget: "string", required: false }
